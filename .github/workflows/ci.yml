name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pydantic openpyxl pyyaml pytest

      - name: Guard — no ad / affiliate / tracker code (rule 1)
        run: bash scripts/guard_no_trackers.sh

      - name: Tests
        run: pytest -q   # pyproject sets pythonpath = src
