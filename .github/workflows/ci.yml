name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (pinned; requirements.lock is the single source)
        run: pip install -r requirements.lock

      - name: Ship gate (all [S##] guardrails)
        run: PY=python3 bash scripts/static-gate.sh
